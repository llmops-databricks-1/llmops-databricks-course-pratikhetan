# Production environment
prd:
  catalog: mlops_prd
  schema: pratikhe
  volume: llmops_files
  llm_endpoint: databricks-llama-4-maverick
  embedding_endpoint: databricks-gte-large-en
  warehouse_id: 96e26e80fcd91931
  vector_search_endpoint: llmops_course_vs_endpoint
  genie_space_id: null
  lakebase_instance: arch-agent-memory
  usage_policy_id: null
  experiment_name: /Shared/arch-designer-agent
  knowledge_base_table: databricks_knowledge_base

# Model configuration
model_config:
  temperature: 0.7
  max_tokens: 2000
  top_p: 0.95

# Vector search configuration
vector_search:
  embedding_dimension: 1024
  similarity_metric: cosine
  num_results: 5

# Chunking configuration
chunking:
  chunk_size: 512
  chunk_overlap: 50
  separator: "\n\n"
