resources:
  jobs:
    arch_designer_agent_job:
      name: arch-designer-agent
      permissions:
        - level: CAN_MANAGE
          user_name: pratikhetan@gmail.com
      tags:
        project_name: "arch-designer-agent"
        environment: ${bundle.target}

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../dist/*.whl

      tasks:
        - task_key: arch_designer_agent
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/3.2_arch_designer_agent.py
            base_parameters:
              env: ${bundle.target}
              git_sha: "${var.git_sha}"
              run_id: "{{job.run_id}}"
